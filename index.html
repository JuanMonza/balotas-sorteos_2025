<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteo Jardines del Renacer - Sistema Profesional</title>
  <link rel="icon" type="image/svg+xml" href="./public/favicon.svg">
  
  <!-- SDKs externos (opcionales) -->
  <script src="/_sdk/element_sdk.js" async defer onerror="console.log('Element SDK no disponible')"></script>
  <script src="/_sdk/data_sdk.js" async defer onerror="console.log('Data SDK no disponible')"></script>
  
  <!-- Librería XLSX para leer archivos Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="./public/styles.css">
  
  <style>
    body {
      box-sizing: border-box;
      overflow: hidden;
      background-image: url('public/CORTINA_DE_BALOTAS_MARZO_2026.jpg');
      background-size: 100% 100%;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    
    #app-container {
      background: transparent;
    }
    
    /* Animación de fuegos pirotécnicos constantes */
    @keyframes firework-rise {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 1;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(0) scale(1);
        opacity: 0;                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
      }
    }
    
    .constant-firework {
      position: fixed;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      z-index: 9998;
      pointer-events: none;
      animation: firework-rise linear infinite;
      box-shadow: 
        0 0 20px currentColor,
        0 0 40px currentColor,
        0 0 60px currentColor,
        0 0 80px currentColor;
      filter: brightness(1.5);
    }
    
    /* Generar diferentes trayectorias - todos en tonos dorados */
    .constant-firework:nth-child(1) { left: 10%; animation-duration: 3s; animation-delay: 0s; color: #FFD700; }
    .constant-firework:nth-child(2) { left: 20%; animation-duration: 3.5s; animation-delay: 0.5s; color: #FFA500; }
    .constant-firework:nth-child(3) { left: 30%; animation-duration: 4s; animation-delay: 1s; color: #FFAA00; }
    .constant-firework:nth-child(4) { left: 40%; animation-duration: 3.2s; animation-delay: 0.3s; color: #FFB700; }
    .constant-firework:nth-child(5) { left: 50%; animation-duration: 3.8s; animation-delay: 0.8s; color: #FFC700; }
    .constant-firework:nth-child(6) { left: 60%; animation-duration: 3.3s; animation-delay: 1.3s; color: #FFDB58; }
    .constant-firework:nth-child(7) { left: 70%; animation-duration: 4.2s; animation-delay: 0.2s; color: #FFD700; }
    .constant-firework:nth-child(8) { left: 80%; animation-duration: 3.6s; animation-delay: 0.6s; color: #FFB347; }
    .constant-firework:nth-child(9) { left: 90%; animation-duration: 3.9s; animation-delay: 0.9s; color: #FFA500; }
    .constant-firework:nth-child(10) { left: 5%; animation-duration: 3.4s; animation-delay: 1.4s; color: #FFBF00; }
    .constant-firework:nth-child(11) { left: 15%; animation-duration: 3.7s; animation-delay: 0.7s; color: #FFD700; }
    .constant-firework:nth-child(12) { left: 25%; animation-duration: 4.1s; animation-delay: 1.1s; color: #FFCC00; }
    .constant-firework:nth-child(13) { left: 35%; animation-duration: 3.5s; animation-delay: 0.4s; color: #FFA500; }
    .constant-firework:nth-child(14) { left: 45%; animation-duration: 3.8s; animation-delay: 1.2s; color: #FFD700; }
    .constant-firework:nth-child(15) { left: 55%; animation-duration: 3.3s; animation-delay: 0.1s; color: #FFB700; }
    .constant-firework:nth-child(16) { left: 65%; animation-duration: 4s; animation-delay: 1s; color: #FFDB58; }
    .constant-firework:nth-child(17) { left: 75%; animation-duration: 3.6s; animation-delay: 0.5s; color: #FFA500; }
    .constant-firework:nth-child(18) { left: 85%; animation-duration: 3.9s; animation-delay: 1.5s; color: #FFD700; }
    .constant-firework:nth-child(19) { left: 95%; animation-duration: 3.4s; animation-delay: 0.2s; color: #FFBF00; }
    .constant-firework:nth-child(20) { left: 12%; animation-duration: 3.7s; animation-delay: 0.9s; color: #FFB347; }
    
    /* Estilo del botón navideño */
    #start-button {
      background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%) !important;
      box-shadow: 0 0 20px rgba(196, 30, 58, 0.5), 0 10px 30px rgba(0, 0, 0, 0.3) !important;
      border: 2px solid #ffffff22;
    }
    
    #start-button:hover {
      box-shadow: 0 0 30px rgba(196, 30, 58, 0.8), 0 10px 40px rgba(0, 0, 0, 0.4) !important;
    }
    
    /* Scrollbar personalizado para historial */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }
    
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      transition: background 0.3s;
    }
    
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    @view-transition { navigation: auto; }
  </style>
</head>
 <body class="h-full">

  <!-- Fuegos pirotécnicos constantes -->

  <div class="constant-firework"></div>
  <div class="constant-firework"></div>
  <div class="constant-firework"></div>
  <div class="constant-firework"></div>
  <div class="constant-firework"></div>

  <main class="h-full w-full overflow-auto">
   <div class="min-h-full w-full flex p-8" id="app-container">

      <div class="ball-container" data-index="2">

      <div class="ball-container" data-index="3">

     <!-- Información del ganador -->
     <div id="winner-info" class="mb-6 px-12 py-8 rounded-3xl opacity-0 transition-all duration-500" style="background: linear-gradient(135deg, rgba(13, 71, 161, 0.4), rgba(25, 118, 210, 0.3)); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 2px solid rgba(100, 181, 246, 0.4); box-shadow: 0 8px 32px rgba(13, 71, 161, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2); min-width: 700px;">
       <div class="text-center">
         <p id="winner-name" class="text-6xl font-bold text-white mb-3" style="text-shadow: 2px 2px 8px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.3);"></p>

     </div>
    </div>
    
   </div>
  </main>
  
  <!-- SECCIÓN DE HISTORIAL - Esquina inferior derecha -->

  <!-- Botones de carga - Esquina inferior izquierda -->

      <label for="background-file-input" class="px-6 py-3 rounded-lg font-bold cursor-pointer transition-all transform hover:scale-105 active:scale-95 shadow-lg flex items-center gap-2" style="background: rgba(46, 204, 113, 0.95); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255, 255, 255, 0.2);">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7"></path><path d="M16 3h-8a2 2 0 0 0-2 2v2h12V5a2 2 0 0 0-2-2z"></path><path d="M8 14l2 2 4-4"></path></svg>
        Cargar Fondo

        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
